[tips-and-tricks-item-description]
LPN-title=Create a Platform network :\n[item=ptflog-requester] act as [item=requester-chest].\n[item=ptflog-provider] act as [item=passive-provider-chest].\n[item=space-platform-hub] act as [item=logistic-robot].\n\nDefine request in [item=ptflog-requester] (section or by circuitry).\n[item=ptflog-provider] define providing item by read green and red signal.\nPlatform are auto-scheduled to get items in [item=ptflog-provider] and then deposit to the [item=ptflog-requester].\n[img=utility/warning_icon]In the [item=ptflog-requester] if a section name contain [virtual-signal=signal-no-entry], the section are not handled by the network.
LPN-tat-1=LPN works with channel.\nEach channel works individualy. By default all entities are affected to network [virtual-signal=signal-A] and sub network 1 .\nYou can change the network and subnetwork in [item=ptflog-provider]/[item=ptflog-requester]/[item=space-platform-hub] GUI.\n
LPN-tat-2=To fullfill request the scedule of [item=space-platform-hub] are auto-set and always the same.\nA custom section with the format "LPN : Platform n° :" is created and contains all items requested for this platform.\nWait conditions at [item=ptflog-provider] station :\n    -Unloading enabled(so be careful)\n    -All requests satisfied\n    -[virtual-signal=signal-green] = 1 (so you can make some circuitry if you want)\nWait conditions at [item=ptflog-requester] station :\n    -Unloading enabled(of course)\n    -Inactivity = 5s\n    -[virtual-signal=signal-green] = 1 (so you can make some circuitry if you want)\n    -when arriving at station : [item=space-platform-hub] section is update with all item request at 0 and for all items item = 0
LPN-tat-3=Let you manage your channels and see request and platform affected at
LPN-tat-4=[img=utility/warning_icon][color=red]BETA TEST[/color]\nThis feature is in test.\nEach tech level add 1 to the maximum [entity=cargo-landing-pad] and [entity=ptflog-requester] you can build per surface.
LPN-tat-provider=Provider acts as an [item=passive-provider-chest].\nAvailable items are sent to the network with [shortcut=give-red-wire].\nAdditional controls can be sent to the provider with [shortcut=give-green-wire]:\n-[virtual-signal=LPN-priority] sends priority to the provider.\n-If items are sent, their quantity acts as a threshold for available items.\n-If [virtual-signal=LPN-rocket_stack] is sent, it acts as a threshold for all items that have not already been defined.\n The quantity is set to: signal value × rocket capacity (per item). 
LPN-tat-requester=Provider acts as an [item=requester-chest].\nAdditional controls can be sent to the provider with [shortcut=give-green-wire]:\n-[virtual-signal=LPN-priority] sends priority to the requester.\n-If items are sent, their quantity acts as a threshold for available items.\n-If [virtual-signal=LPN-rocket_stack] is sent, it acts as a threshold for all items that have not already been defined.\n The quantity is set to: signal value × rocket capacity (per item).\nSection can be ignored by the system.Section name must contain [virtual-signal=signal-no-entry] signal to be ignored.



